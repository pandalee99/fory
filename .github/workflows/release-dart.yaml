name: Publish Dart
run-name: "Dart Release: ${{ github.ref_name }}"

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-dart-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-dart:
    runs-on: ubuntu-latest
    if: github.repository == 'apache/fory' && !startsWith(github.ref_name, 'go/fory')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Bump Dart package versions for the release tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          DART_VERSION="$VERSION"
          if [[ "$VERSION" =~ ^(.+)-rc([0-9]+)$ ]]; then
            DART_VERSION="${BASH_REMATCH[1]}-rc.${BASH_REMATCH[2]}"
          fi
          python ci/release.py bump_version -l dart -version "$DART_VERSION"
          if [[ "$VERSION" == *-rc* ]]; then
            echo "PUB_PUBLISH_VALIDATION_FLAGS=--skip-validation" >> "$GITHUB_ENV"
          else
            echo "PUB_PUBLISH_VALIDATION_FLAGS=" >> "$GITHUB_ENV"
          fi
          VERSION="$DART_VERSION" ruby <<'RUBY'
          require "yaml"

          expected = ENV.fetch("VERSION")
          files = [
            "dart/pubspec.yaml",
            "dart/packages/fory/pubspec.yaml",
            "dart/packages/fory-test/pubspec.yaml",
          ]

          files.each do |path|
            actual = YAML.load_file(path).fetch("version")
            if actual != expected
              abort("#{path} version mismatch after bump: expected #{expected}, got #{actual}")
            end
          end

          puts "Verified bumped Dart package versions for #{expected}"
          RUBY

      - uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c  # v1.7.1

      - name: Install Dart package dependencies
        shell: bash
        working-directory: dart/packages/fory
        run: |
          set -euo pipefail
          dart pub get

      - name: Verify publish contents
        shell: bash
        working-directory: dart/packages/fory
        run: |
          set -euo pipefail
          dart pub publish --dry-run ${PUB_PUBLISH_VALIDATION_FLAGS}

      - name: Publish to pub.dev
        shell: bash
        working-directory: dart/packages/fory
        run: |
          set -euo pipefail
          dart pub publish --force ${PUB_PUBLISH_VALIDATION_FLAGS}
